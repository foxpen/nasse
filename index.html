<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naše — vyber sekci</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="splash" id="splash" aria-hidden="true">
  <div class="splash-inner">
    <div class="splash-icons">
      <span class="si si-house"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10h14V10"/><path d="M9.5 20v-6h5v6"/></svg></span>
      <span class="si si-car"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 11l1.6-4A2 2 0 0 1 8.5 6h7a2 2 0 0 1 1.9 1.3L19 11"/><rect x="3" y="11" width="18" height="6" rx="1.5"/><path d="M7 17v1.5M17 17v1.5"/><circle cx="7.5" cy="14" r=".8"/><circle cx="16.5" cy="14" r=".8"/></svg></span>
    </div>
    <div class="splash-word">Naše</div>
    <span class="splash-bar" aria-hidden="true"></span>
  </div>
</div>
<script>(function(){var s=document.getElementById('splash');if(!s)return;if(matchMedia('(prefers-reduced-motion: reduce)').matches){s.remove();return;}setTimeout(function(){s.remove();},2750);})();</script>

<main class="onboard">
  <div class="ob-inner">
    <div class="ob-head">
      <div class="logo reveal" style="animation-delay:.02s" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 9.5V21h14V9.5"/><path d="M9.5 21v-6h5v6"/></svg>
      </div>
      <h1 class="wordmark reveal" style="animation-delay:.08s">Naše</h1>
      <span class="accentbar reveal" style="animation-delay:.12s" aria-hidden="true"></span>
      <p class="sub reveal" style="animation-delay:.16s">Náš rodinný přehled. Bydlení a auta na jednom místě.</p>
    </div>

    <div class="tiles">
      <a class="tile byd reveal" href="bydleni.html" style="animation-delay:.24s">
        <div class="tile-media" id="media-byd"></div>
        <div class="tile-body">
          <span class="tile-ic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10h14V10"/><path d="M9.5 20v-6h5v6"/></svg></span>
          <h2>Naše Bydleníčko</h2>
          <span class="tile-desc">Cena, m², dojezd na Pankrác, hypotéka</span>
          <span class="tile-stat" id="stat-byd">Nemovitosti k porovnání</span>
          <span class="tile-go">Otevřít <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
        </div>
      </a>

      <a class="tile aut reveal" href="auta.html" style="animation-delay:.32s">
        <div class="tile-media" id="media-aut"></div>
        <div class="tile-body">
          <span class="tile-ic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 11l1.6-4A2 2 0 0 1 8.5 6h7a2 2 0 0 1 1.9 1.3L19 11"/><rect x="3" y="11" width="18" height="6" rx="1.5"/><path d="M7 17v1.5M17 17v1.5"/><circle cx="7.5" cy="14" r=".8"/><circle cx="16.5" cy="14" r=".8"/></svg></span>
          <h2>Naše Autíčko</h2>
          <span class="tile-desc">Cena, rok, najeto, výkon</span>
          <span class="tile-stat" id="stat-aut">Auta k porovnání</span>
          <span class="tile-go">Otevřít <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
        </div>
      </a>
    </div>

    <p class="ob-foot reveal" style="animation-delay:.42s">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
      Soukromý přehled · jen pro nás
    </p>
  </div>
</main>

<script>(async function(){
  try{
    const r=await fetch('/.netlify/functions/list'); if(!r.ok) return;
    const all=await r.json();
    const byd=all.filter(x=>x.section==='byd'), aut=all.filter(x=>x.section==='auto');
    if(byd.length){
      const prices=byd.map(x=>x.price).filter(Boolean);
      const m=prices.length?(Math.min(...prices)/1e6).toFixed(2).replace('.',','):null;
      document.getElementById('stat-byd').textContent = byd.length+' nemovitostí'+(m?' · od '+m+' mil. Kč':'');
      const pic=byd.slice().sort((a,b)=>(a.price/a.area)-(b.price/b.area)).find(x=>x.img);
      if(pic) document.getElementById('media-byd').style.backgroundImage='url("'+pic.img+'")';
    }
    if(aut.length){
      document.getElementById('stat-aut').textContent = aut.length+' vozů';
      const pic=aut.find(x=>x.win&&x.img)||aut.find(x=>x.img);
      if(pic) document.getElementById('media-aut').style.backgroundImage='url("'+pic.img+'")';
    }
  }catch(e){}
})();</script>
</body>
</html>
